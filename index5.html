<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <h1>Image Gallery</h1>

    <div class="gallery">

        <div class="image-box">
            <img src="https://picsum.photos/400/300?random=1" alt="Image 1">
            <div class="caption">Beautiful Nature</div>
        </div>

        <div class="image-box">
            <img src="https://picsum.photos/400/300?random=2" alt="Image 2">
            <div class="caption">Mountain View</div>
        </div>

        <div class="image-box">
            <img src="https://picsum.photos/400/300?random=3" alt="Image 3">
            <div class="caption">City Lights</div>
        </div>

        <div class="image-box">
            <img src="https://picsum.photos/400/300?random=4" alt="Image 4">
            <div class="caption">Ocean Waves</div>
        </div>

        <div class="image-box">
            <img src="https://picsum.photos/400/300?random=5" alt="Image 5">
            <div class="caption">Green Forest</div>
        </div>

        <div class="image-box">
            <img src="https://picsum.photos/400/300?random=6" alt="Image 6">
            <div class="caption">Sunset Sky</div>
        </div>

    </div>

</body>
</html>
